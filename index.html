<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #080a0f;
            --bg-card: #12161d;
            --bg-nav: #1c2128;
            --text-main: #adbac7;
            --text-bright: #ffffff;
            --accent-up: #44d67d;
            --accent-down: #ff6b6b;
            --border: #30363d;
            --blue: #316dca;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navegação superior */
        nav {
            background-color: var(--bg-nav);
            padding: 0 20px;
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-main);
            padding: 15px 10px;
            cursor: pointer;
            font-weight: 600;
            border-bottom: 2px solid transparent;
        }

        nav button.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        /* Container de visualizações */
        .view-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* GRID: VISÃO GERAL */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* INDIVIDUAL: LAYOUT LATERAL */
        .individual-layout {
            display: flex;
            gap: 20px;
            height: 100%;
        }

        .sidebar-list {
            width: 300px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .main-chart-area {
            flex-grow: 1;
            background: var(--bg-card);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        /* Componentes Comuns */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .card:hover {
            border-color: var(--blue);
        }

        .logo {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-right: 12px;
        }

        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .up {
            color: var(--accent-up);
        }

        .down {
            color: var(--accent-down);
        }

        .price-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-bright);
        }

        .sidebar-item {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .sidebar-item.active {
            background: #316dca22;
            border-left: 4px solid var(--blue);
        }
    </style>
</head>

<body>

    <nav>
        <button id="btnAll" class="active" onclick="switchView('all')">Todas as Empresas</button>
        <button id="btnInd" onclick="switchView('individual')">Visualização Individual</button>
    </nav>

    <div class="view-container">
        <div id="viewAll" class="market-grid"></div>

        <div id="viewIndividual" class="individual-layout hidden">
            <div class="sidebar-list" id="sideList"></div>
            <div class="main-chart-area">
                <div id="indHeader">
                    <h1 id="indName">Selecione uma empresa</h1>
                    <div class="price-label" id="indPrice">R$ --</div>
                </div>
                <div style="height: 400px; margin-top: 20px;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados com Histórico
        let companies = [{"name": "EMPRESA ANONIMA 1", "symbol": "EMPA001", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NoLogo/NOLOGO.png", "price": 0.5, "variation": -1, "color": "#4a4948", "history": [-1,-1]},{"name": "Cya Wear", "symbol": "CYWE010", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Cya%20Wear/CYAWEARLOGO.png", "price": 4.5, "variation": 1, "color": "#eec49a", "history": [1,1]},{"name": "Cantinho Romrom", "symbol": "CARO012", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Cantinho%20Romrom/CANTINHOROMROMLOGO.png", "price": 2.5, "variation": -1, "color": "#fda726", "history": [1,-1]},{"name": "EMPRESA ANONIMA 2", "symbol": "EMPA002", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NoLogo/NOLOGO.png", "price": 0, "variation": -1, "color": "#4a4948", "history": [-1,-1]},{"name": "Anna´s candy", "symbol": "ANCA013", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/3be93113f93fe2dfaf339f74b9d605fbfba1bac6/assets/Annas%20Cand/ANNASCANDYLOGO.png", "price": 0.5, "variation": -1, "color": "#ec0460", "history": [-1,-1]},{"name": "LunaBeauty", "symbol": "LUNB002", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/LunaBeauty/LunaBeauty.png", "price": 2.5, "variation": -1, "color": "#704f52", "history": [1,-1]},{"name": "Encrespa Brasil", "symbol": "ENCB001", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Encrespa%20Brasil/ENCRESPA_BRASIL_LOGO.png", "price": 4.5, "variation": 1, "color": "#f9ed0c", "history": [1,1]},{"name": "Clara Confeitaria Fina", "symbol": "CLAC006", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/9a42f771a7025847b9f76a5e8c60d6a51819a32b/assets/Clara%20Confeitaria%20Fina/CLARACONFEITARIALOGO.png", "price": 2.5, "variation": -1, "color": "#ab1c7e", "history": [1,-1]},{"name": "Connect Teen.", "symbol": "CONT003", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/3be93113f93fe2dfaf339f74b9d605fbfba1bac6/assets/Connect%20Teen/CONNECTTEENLOGO.png", "price": 2.1, "variation": -1, "color": "#8f858b", "history": [0.6,-1]},{"name": "hardX", "symbol": "HARX007", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/HardX/Hadxlogo.png", "price": 4.5, "variation": 1, "color": "#3f5ef8", "history": [1,1]},{"name": "NaturalX", "symbol": "NATX011", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NaturalX/NATURALXLOGO.png", "price": 2, "variation": -1, "color": "#09792f", "history": [1,-1]},{"name": "HaySof Joias", "symbol": "HASO014", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/HaySofJoias/HaySofJoiasLOGO.png", "price": 2, "variation": 1, "color": "#eec49a", "history": [-1,1]},{"name": "jabuticada123", "symbol": "JABT008", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Jabuticaba123/jabuticaba123logo.png", "price": 4.5, "variation": 1, "color": "#8f858b", "history": [1,1]},{"name": "EMPRESA ANONIMA 3", "symbol": "EMPA003", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NoLogo/NOLOGO.png", "price": 0.5, "variation": -1, "color": "#4a4948", "history": [-1,-1]},{"name": "Red Smoke", "symbol": "EMPA004", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/RedSmoke/RedSmokeLOGO.png", "price": 4.5, "variation": 1, "color": "#4a4948", "history": [1,1]},{"name": "EMPRESA ANONIMA 5", "symbol": "EMPA005", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NoLogo/NOLOGO.png", "price": 0.5, "variation": -1, "color": "#4a4948", "history": [-1,-1]},{"name": "Intecno", "symbol": "INTE015", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Intecno/IntecnoLOGO.png", "price": 2.5, "variation": 1, "color": "#fcbd00", "history": [-1,1]},{"name": "Lavanda Lunar", "symbol": "LALU009", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Lavanda%20Lunar/LAVANDALUNALOGO.png", "price": 4, "variation": 1, "color": "#b15dd2", "history": [1,1]},{"name": "NovaMente soluções", "symbol": "NOVS004", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/NoLogo/NOLOGO.png", "price": 4.1, "variation": 1, "color": "#4a4948", "history": [0.6,1]},{"name": "VerdÉra", "symbol": "VERE005", "logo": "https://raw.githubusercontent.com/proflourenco/adm-ptic/refs/heads/main/assets/Verdera/VERDEERALOGO.png", "price": 2.1, "variation": -1, "color": "#1fb226", "history": [0.6,-1]}];

        let myMainChart = null;

        function init() {
            // 1. Ordenar por valor decrescente
            companies.sort((a, b) => b.price - a.price);

            renderGridView();
            renderSidebarView();

            // Selecionar a primeira (mais cara) por padrão na visão individual
            selectCompany(companies[0].symbol);
        }

        function switchView(view) {
            document.getElementById('viewAll').classList.toggle('hidden', view !== 'all');
            document.getElementById('viewIndividual').classList.toggle('hidden', view !== 'individual');
            document.getElementById('btnAll').classList.toggle('active', view === 'all');
            document.getElementById('btnInd').classList.toggle('active', view === 'individual');
        }

        function renderGridView() {
            const container = document.getElementById('viewAll');
            container.innerHTML = companies.map((c, i) => `
            <div class="card" onclick="switchView('individual'); selectCompany('${c.symbol}')">
                <div class="flex-row">
                    <div style="display:flex; align-items:center">
                        <div class="logo" style="background:${c.logo ? 'transparent' : c.color}">
    ${c.logo
                    ? `<img src="${c.logo}" style="width:100%; height:100%; object-fit:cover; border-radius:6px;">`
                    : c.name[0]
                }
</div>
                        <div>
                            <div style="font-weight:bold">${c.symbol}</div>
                            <div style="font-size:0.75rem">${c.name}</div>
                        </div>
                    </div>
                    <div style="text-align:right">
                        <div class="price-label">R$ ${c.price.toFixed(2)}</div>
                        <div class="${c.variation >= 0 ? 'up' : 'down'}">${c.variation}%</div>
                    </div>
                </div>
                <div style="height:80px; margin-top:10px">
                    <canvas id="miniChart-${i}"></canvas>
                </div>
            </div>
        `).join('');

            // Renderiza mini gráficos
            companies.forEach((c, i) => renderChart(`miniChart-${i}`, c, false));
        }

        function renderSidebarView() {
            const list = document.getElementById('sideList');
            list.innerHTML = companies.map(c => `
            <div class="sidebar-item" id="side-${c.symbol}" onclick="selectCompany('${c.symbol}')">
                <div class="flex-row">
                    <span><strong>${c.symbol}</strong></span>
                    <span>R$ ${c.price.toFixed(2)}</span>
                </div>
            </div>
        `).join('');
        }

        function selectCompany(symbol) {
            const company = companies.find(c => c.symbol === symbol);

            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`side-${symbol}`).classList.add('active');

            document.getElementById('indName').innerText = `${company.name} (${company.symbol})`;
            document.getElementById('indPrice').innerHTML = `R$ ${company.price.toFixed(2)} <span class="${company.variation >= 0 ? 'up' : 'down'}" style="font-size: 1rem">(${company.variation}%)</span>`;

            renderChart('mainChart', company, true);
        }

        function renderChart(canvasId, company, showAxes) {
            const ctx = document.getElementById(canvasId).getContext('2d');

            if (canvasId === 'mainChart' && myMainChart) myMainChart.destroy();

            const config = {
                type: 'line',
                data: {
                    labels: ['Montagem da Empresa 04_03', "Manual da Empresa 11_03"],
                    datasets: [{
                        data: company.history,
                        borderColor: company.color,
                        backgroundColor: company.color + '22',
                        fill: true,
                        tension: 0.4,
                        pointRadius: showAxes ? 4 : 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: showAxes },
                        y: { display: showAxes, grid: { color: '#30363d' } }
                    }
                }
            };

            const chart = new Chart(ctx, config);
            if (canvasId === 'mainChart') myMainChart = chart;
        }

        init();
    </script>

</body>

</html>
